<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Workflow run detail mock for a graph.v2 adopt-pr run</title>
  <desc id="desc">A dashboard mock showing a real graph.v2 formula run based on mol-adopt-pr-v2 and expansion-review-pr, with retry steps, check loops, expansion fanout, conditional nodes, selected node state, code working-tree diff tab, and coding-agent session tab.</desc>
  <style>
    .page { fill: #f3eee5; }
    .ink { fill: #1d1a17; }
    .muted { fill: #6d675f; }
    .faint { fill: #8f877c; }
    .rule { stroke: #d6cec1; stroke-width: 1; }
    .soft-rule { stroke: #e4dccf; stroke-width: 1; }
    .node { fill: #f8f4ec; stroke: #8b8277; stroke-width: 1.2; }
    .done { fill: #f1eadf; stroke: #8a8278; }
    .pending { fill: #f4eee4; stroke: #b7afa4; stroke-dasharray: 5 5; }
    .running { fill: #f8f4ec; stroke: #1d1a17; stroke-width: 1.7; }
    .selected { fill: #f8f4ec; stroke: #7b2d2a; stroke-width: 3; }
    .scope { fill: #eee6da; stroke: #cbbfac; stroke-width: 1.2; }
    .scope2 { fill: #f5efe5; stroke: #b9ad9f; stroke-width: 1.2; stroke-dasharray: 8 6; }
    .badge { fill: #eee6da; stroke: #b9ad9f; stroke-width: 1; }
    .badge-dark { fill: #1d1a17; stroke: #1d1a17; }
    .badge-warn { fill: #f8f4ec; stroke: #7b2d2a; stroke-width: 1.2; }
    .maroon { fill: #7b2d2a; }
    .line { stroke: #9b9288; stroke-width: 1.3; fill: none; }
    .line-faint { stroke: #c8bfb3; stroke-width: 1.1; fill: none; }
    .diff-add { fill: #2d5f48; }
    .diff-del { fill: #8c3a33; }
    .diff-hunk { fill: #6f5b1e; }
    .tab-active { fill: #f8f4ec; stroke: #a99e91; stroke-width: 1; }
    .tab { fill: #eee6da; stroke: #cbbfac; stroke-width: 1; }
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
    .nav { font-size: 15px; font-weight: 650; }
    .small { font-size: 13px; }
    .tiny { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
    .h1 { font-size: 32px; font-weight: 760; }
    .h2 { font-size: 19px; font-weight: 720; }
    .label { font-size: 14px; font-weight: 680; }
    .body { font-size: 13px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
  </style>

  <rect class="page" x="0" y="0" width="1600" height="1000"/>

  <g aria-label="top navigation">
    <rect x="0" y="0" width="1600" height="74" fill="#eee7dc"/>
    <line class="rule" x1="0" y1="74" x2="1600" y2="74"/>
    <text class="nav ink" x="64" y="45">gas city</text>
    <text class="small muted" x="133" y="45">.</text>
    <text class="nav muted" x="151" y="45">racoon-city</text>
    <text class="nav muted" x="310" y="45">Agents</text>
    <text class="nav muted" x="386" y="45">Beads</text>
    <text class="nav ink" x="456" y="45">Workflows</text>
    <text class="nav muted" x="565" y="45">Mail</text>
    <text class="nav muted" x="620" y="45">Activity</text>
    <text class="nav muted" x="715" y="45">Health</text>
    <text class="tiny muted" x="1480" y="45">LIGHT</text>
  </g>

  <g aria-label="page header">
    <text class="h1 ink" x="64" y="128">Adopt PR run</text>
    <text class="body muted" x="64" y="157">mol-adopt-pr-v2, graph.v2, root bead wf-adopt-pr-271, city racoon-city</text>
    <text class="tiny muted" x="64" y="196">STATUS</text>
    <text class="label ink" x="64" y="218">1 running</text>
    <text class="tiny muted" x="165" y="196">DONE</text>
    <text class="label ink" x="165" y="218">8</text>
    <text class="tiny muted" x="230" y="196">PENDING</text>
    <text class="label ink" x="230" y="218">4</text>
    <text class="tiny muted" x="320" y="196">SELECTED</text>
    <text class="label maroon" x="320" y="218">Apply review fixes and set verdict</text>
  </g>

  <g aria-label="workflow graph">
    <text class="tiny muted" x="64" y="270">GRAPH.V2 FORMULA RUN</text>
    <text class="small muted" x="64" y="291">Concrete example: mol-adopt-pr-v2 with expansion-review-pr materialized under the review pipeline.</text>

    <rect class="scope" x="64" y="314" width="815" height="656" rx="8"/>
    <text class="label ink" x="88" y="342">Adopt PR body scope</text>
    <text class="small muted" x="88" y="362">scope body, finalizer badge attached, cleanup waits on body latch</text>
    <rect class="badge" x="705" y="328" width="72" height="24" rx="12"/>
    <text class="tiny muted" x="722" y="344">SCOPE</text>
    <rect class="badge" x="785" y="328" width="70" height="24" rx="12"/>
    <text class="tiny muted" x="800" y="344">FINAL</text>

    <path class="line" d="M472 382 L472 870"/>

    <rect class="node done" x="248" y="382" width="448" height="48" rx="4"/>
    <text class="label ink" x="270" y="405">Preflight repository and source bead</text>
    <text class="small muted" x="270" y="423">retry-managed setup, attempt 1/3, done</text>
    <rect class="badge" x="612" y="394" width="62" height="24" rx="12"/>
    <text class="tiny muted" x="626" y="410">DONE</text>

    <rect class="node done" x="248" y="454" width="448" height="48" rx="4"/>
    <text class="label ink" x="270" y="477">Create worktree and verify rebaseability</text>
    <text class="small muted" x="270" y="495">retry-managed setup, attempt 1/3, done</text>
    <rect class="badge" x="612" y="466" width="62" height="24" rx="12"/>
    <text class="tiny muted" x="626" y="482">DONE</text>

    <rect class="running" x="210" y="526" width="524" height="58" rx="29"/>
    <text class="label ink" x="236" y="552">Review / fix loop</text>
    <text class="small muted" x="236" y="570">check loop, active attempt 2, waits for review verdict</text>
    <rect class="badge-dark" x="617" y="543" width="92" height="26" rx="13"/>
    <text class="tiny" x="632" y="560" fill="#f8f4ec">RUNNING</text>

    <rect class="scope2" x="118" y="606" width="708" height="190" rx="7"/>
    <text class="label ink" x="142" y="635">Multi-model review pipeline</text>
    <text class="small muted" x="142" y="654">compose.expand -> expansion-review-pr, retry nodes materialized inside the run</text>

    <path class="line-faint" d="M220 678 L720 678"/>
    <path class="line-faint" d="M270 678 L270 708"/>
    <path class="line-faint" d="M426 678 L426 708"/>
    <path class="line-faint" d="M582 678 L582 708"/>
    <path class="line-faint" d="M720 678 L720 708"/>

    <rect class="node done" x="158" y="708" width="130" height="48" rx="4"/>
    <text class="small ink" x="174" y="730">Claude review</text>
    <text class="tiny muted" x="174" y="747">RETRY DONE</text>

    <rect class="node done" x="314" y="708" width="130" height="48" rx="4"/>
    <text class="small ink" x="330" y="730">Codex review</text>
    <text class="tiny muted" x="330" y="747">RETRY DONE</text>

    <rect class="pending" x="470" y="708" width="130" height="48" rx="4"/>
    <text class="small ink" x="486" y="730">DeepSeek review</text>
    <text class="tiny muted" x="486" y="747">SKIPPED</text>

    <rect class="node done" x="626" y="708" width="158" height="48" rx="4"/>
    <text class="small ink" x="642" y="730">Synthesize findings</text>
    <text class="tiny muted" x="642" y="747">GATHER DONE</text>

    <rect class="selected" x="248" y="812" width="448" height="58" rx="4"/>
    <text class="label ink" x="270" y="837">Apply review fixes and set verdict</text>
    <text class="small muted" x="270" y="856">selected node, retry-managed, active session streaming</text>
    <rect class="badge-warn" x="592" y="828" width="82" height="26" rx="13"/>
    <text class="tiny maroon" x="606" y="845">2 OF 3</text>

    <path class="line" d="M472 870 L472 928"/>
    <rect class="pending" x="913" y="314" width="0" height="0" rx="0"/>
  </g>

  <g aria-label="continued workflow nodes">
    <rect class="pending" x="64" y="938" width="815" height="0" rx="0"/>
    <rect class="running" x="84" y="928" width="232" height="42" rx="21"/>
    <text class="small ink" x="104" y="953">Pre-approval CI repair loop</text>
    <text class="tiny muted" x="104" y="967">CONDITIONAL, CHECK LOOP</text>

    <rect class="pending" x="335" y="928" width="172" height="42" rx="4"/>
    <text class="small ink" x="351" y="953">Human approval</text>
    <text class="tiny muted" x="351" y="967">CONDITIONAL</text>

    <rect class="pending" x="526" y="928" width="214" height="42" rx="4"/>
    <text class="small ink" x="542" y="953">Finalize merge-ready handoff</text>
    <text class="tiny muted" x="542" y="967">RETRY PENDING</text>

    <rect class="pending" x="759" y="928" width="120" height="42" rx="4"/>
    <text class="small ink" x="774" y="953">Cleanup</text>
    <text class="tiny muted" x="774" y="967">TEARDOWN</text>
  </g>

  <g aria-label="right panel">
    <text class="tiny muted" x="940" y="270">DETAIL PANELS</text>
    <rect class="tab-active" x="940" y="292" width="96" height="42" rx="5"/>
    <text class="label ink" x="971" y="318">Diff</text>
    <rect class="tab" x="1042" y="292" width="144" height="42" rx="5"/>
    <text class="label muted" x="1070" y="318">Session</text>
    <rect class="badge" x="1196" y="300" width="122" height="26" rx="13"/>
    <text class="tiny muted" x="1214" y="317">SELECTED NODE</text>

    <rect x="940" y="333" width="596" height="650" rx="8" fill="#f8f4ec" stroke="#cbbfac" stroke-width="1"/>
    <text class="h2 ink" x="970" y="374">Current code diff</text>
    <text class="small muted" x="970" y="397">Execution folder resolved from workflow metadata. Source, test, docs, and config changes from git.</text>

    <rect class="badge" x="970" y="422" width="92" height="26" rx="13"/>
    <text class="tiny muted" x="989" y="439">4 FILES</text>
    <rect class="badge" x="1071" y="422" width="106" height="26" rx="13"/>
    <text class="tiny muted" x="1091" y="439">UNSTAGED</text>

    <line class="soft-rule" x1="970" y1="468" x2="1505" y2="468"/>
    <text class="mono muted" x="970" y="498">diff --git a/src/routes/Workflows.tsx b/src/routes/Workflows.tsx</text>
    <text class="mono diff-hunk" x="970" y="523">@@ -42,7 +42,10 @@</text>
    <text class="mono diff-del" x="970" y="548">-  return &lt;LaneCard lane={lane} /&gt;;</text>
    <text class="mono diff-add" x="970" y="573">+  return &lt;LaneCard lane={lane} href={`/workflows/${lane.id}`} /&gt;;</text>
    <text class="mono diff-add" x="970" y="598">+  // graph.v2 detail route resolves scope server-side</text>

    <text class="mono muted" x="970" y="638">diff --git a/backend/src/routes/workflows.ts b/backend/src/routes/workflows.ts</text>
    <text class="mono diff-hunk" x="970" y="663">@@ -0,0 +1,8 @@</text>
    <text class="mono diff-add" x="970" y="688">+router.get("/:workflowId", async (req, res) =&gt; {</text>
    <text class="mono diff-add" x="970" y="713">+  const detail = await loadGraphV2Run(req.params.workflowId);</text>
    <text class="mono diff-add" x="970" y="738">+  res.json(detail);</text>
    <text class="mono diff-add" x="970" y="763">+});</text>

    <line class="soft-rule" x1="970" y1="798" x2="1505" y2="798"/>
    <text class="h2 ink" x="970" y="833">Selected node session</text>
    <text class="small muted" x="970" y="856">Coding-agent request and response transcript for Apply review fixes and set verdict.</text>
    <rect class="badge-dark" x="970" y="875" width="100" height="26" rx="13"/>
    <text class="tiny" x="987" y="892" fill="#f8f4ec">STREAMING</text>
    <text class="mono muted" x="1090" y="893">agent workflows.codex-max, attempt 2</text>
    <text class="mono muted" x="970" y="924">request: Apply blocker fixes from synthesis.md and run focused tests.</text>
    <text class="mono ink" x="970" y="949">agent: I am inspecting the failing path, then I will patch the minimal code.</text>
    <text class="mono muted" x="970" y="974">tool: rg -n "review verdict|quality scorecard" src tests</text>
  </g>
</svg>
