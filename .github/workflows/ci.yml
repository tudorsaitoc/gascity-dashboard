# Quality gates run on every PR against main and every push to main.
#
# Scope is intentionally narrow for v1:
#   - lint (eslint flat config: typescript-eslint + type-aware rules,
#     react-hooks, react/no-danger, import/first) at --max-warnings=0
#   - typecheck across all three workspaces (shared, backend, frontend)
#   - typecheck of test files too (catches type drift the runtime tests miss)
#   - generated gc supervisor OpenAPI client drift check
#   - shared tests (node --test via tsx)
#   - backend tests (node --test via tsx loader)
#   - frontend tests (vitest in jsdom)
#
# Not yet in CI (file a separate bead if you want to change this):
#   - scripts/snap.mjs (Playwright visual snaps — too heavy, no golden source)
#
# The job is single + sequential. Split into a matrix later if the wall-clock
# time becomes a problem; for the current size it runs comfortably under
# two minutes.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Newer PR pushes supersede older runs on the same PR head — saves minutes
# on iterative PR pushes. Pushes to main are NOT cancelled: github.ref for
# a push to main is always refs/heads/main, so back-to-back main commits
# share the same concurrency group; without the conditional below they
# would cancel each other and erase the green signal on a passing commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Read-only token. CI doesn't push commits, doesn't comment on PRs, doesn't
# touch releases. Anything that needs more goes in a separate workflow with
# explicitly scoped permissions.
permissions:
  contents: read

jobs:
  test:
    name: typecheck + tests (node 24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # '24.x' rolls minor/patch updates within Node 24 (Active LTS) — the
          # engines field requires '>=24.0.0'. Pin to a patch version (or use
          # .nvmrc with node-version-file) if reproducibility matters more than
          # security patches.
          node-version: '24.x'
          cache: 'npm'

      - name: Install
        run: npm ci

      # backend and frontend both type-import from gas-city-dashboard-shared,
      # which only resolves to its dist/ output. Build it first so the
      # subsequent typecheck steps see real symbols, not unresolved modules.
      - name: Build shared
        run: npm run build:shared

      - name: Shared tests
        run: npm --workspace shared test
      # Run the OpenAPI drift check AFTER build:shared. The check generates
      # the hey-api supervisor SDK into a temp dir and compares it with the
      # committed generated tree; keeping it post-build leaves room for future
      # generator extensions that import shared types.
      - name: Check generated gc supervisor client
        run: npm run openapi:gc-supervisor:check

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Typecheck (src)
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck (backend tests)
        run: npm --workspace backend run typecheck:test

      - name: Typecheck (frontend tests)
        run: npm --workspace frontend run typecheck:test

      # Lint after typecheck (type-aware rules reuse the same tsconfig
      # projects) and before tests, so a hygiene failure surfaces fast.
      # --max-warnings=0 is set in the `lint` script: warnings fail CI too.
      - name: Lint
        run: npm run lint

      # Vite's bundler resolution can fail where tsc passes (path aliases,
      # asset imports, dynamic import boundaries). Run the real build so
      # CI catches what typecheck alone misses. Backend's build is just
      # `tsc`, so its typecheck step already covers that surface.
      - name: Build frontend
        run: npm --workspace frontend run build

      - name: Backend tests
        run: npm --workspace backend test

      - name: Frontend tests
        run: npm --workspace frontend test
